<div class="container">
  <form #userForm="ngForm" (ngSubmit)="submitForm(userForm)" class="card w-100 align-items-center">
    <div class="form-group">
      <label>Name:</label>
      <input
        class="form-control"
        type="text"
        name="name"
        [(ngModel)]="user.name"
        required
        #nameCtrl="ngModel"
      />
      @if (nameCtrl.invalid && nameCtrl.touched && nameCtrl.dirty){
      <small class="text-danger"> Name is required </small>
      }
    </div>
 
    <div>
      <label>Email:</label>
      <input
        class="form-control"
        type="email"
        name="email"
        [(ngModel)]="user.email"
        required
        #emailCtrl="ngModel"
      />
      @if (emailCtrl.invalid && emailCtrl.touched){
      <small class="text-danger"> Email is required </small>
      }
    </div>
 
    <button class="btn btn-primary" type="submit" [disabled]="userForm.invalid">Submit</button>
  </form>
 
  <p><b>Live Model:</b> {{ user | json }}</p>
</div>
